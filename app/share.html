<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1F8AFF">
    <title>Share Location - Commander Companion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #111b23 0%, #1a2730 100%);
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .icon {
            width: 64px;
            height: 64px;
            background: #1F8AFF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        
        .icon svg {
            width: 32px;
            height: 32px;
            fill: white;
        }
        
        h1 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 12px;
        }
        
        .subtitle {
            text-align: center;
            color: #9AA3AF;
            margin-bottom: 24px;
            font-size: 14px;
        }
        
        .location-info {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
        }
        
        .location-info p {
            margin-bottom: 8px;
            font-size: 14px;
            word-break: break-all;
        }
        
        .location-info p:last-child {
            margin-bottom: 0;
        }
        
        .location-info strong {
            color: #1F8AFF;
        }
        
        .status {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        
        .status.success {
            background: rgba(46, 125, 50, 0.2);
            color: #66BB6A;
        }
        
        .status.error {
            background: rgba(211, 47, 47, 0.2);
            color: #EF5350;
        }
        
        .status.info {
            background: rgba(31, 138, 255, 0.2);
            color: #1F8AFF;
        }
        
        .button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }
        
        .button.primary {
            background: #1F8AFF;
            color: white;
        }
        
        .button.primary:hover {
            background: #1976D2;
        }
        
        .button.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        .button.secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
            </svg>
        </div>
        
        <h1>Share Location to Car</h1>
        <p class="subtitle">Send this location to your car's navigation</p>
        
        <div id="locationInfo" class="location-info hidden"></div>
        
        <div id="status" class="status hidden"></div>
        
        <button id="sendBtn" class="button primary" onclick="sendToCar()">
            <span id="sendBtnText">Send to Car</span>
        </button>
        
        <button class="button secondary" onclick="openApp()">
            Open Companion App
        </button>
    </div>
    
    <script>
        let sharedData = {
            title: '',
            text: '',
            url: '',
            latitude: null,
            longitude: null,
            locationName: ''
        };
        
        // Parse URL parameters
        function parseSharedData() {
            const params = new URLSearchParams(window.location.search);
            sharedData.title = params.get('title') || '';
            sharedData.text = params.get('text') || '';
            sharedData.url = params.get('url') || '';
            
            // Try to extract location from URL or text
            const locationData = extractLocation(sharedData.url || sharedData.text);
            if (locationData) {
                sharedData.latitude = locationData.lat;
                sharedData.longitude = locationData.lng;
                sharedData.locationName = locationData.name || sharedData.title || 'Shared Location';
            }
            
            displayLocationInfo();
        }
        
        // Extract location from various map URL formats
        function extractLocation(input) {
            if (!input) return null;
            
            // Google Maps: https://www.google.com/maps/place/.../@40.7128,-74.0060,15z
            // Google Maps: https://maps.app.goo.gl/... (short link - will show URL)
            // Google Maps: https://www.google.com/maps?q=40.7128,-74.0060
            let match = input.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
            if (match) {
                return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
            }
            
            match = input.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/);
            if (match) {
                return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
            }
            
            // Apple Maps: https://maps.apple.com/?ll=40.7128,-74.0060
            match = input.match(/[?&]ll=(-?\d+\.\d+),(-?\d+\.\d+)/);
            if (match) {
                return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
            }
            
            // Plain coordinates in text: "40.7128, -74.0060" or "40.7128,-74.0060"
            match = input.match(/(-?\d+\.\d+)\s*,\s*(-?\d+\.\d+)/);
            if (match) {
                return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
            }
            
            // If it's a maps URL but we couldn't extract coords, still return it
            if (input.includes('maps.google.com') || input.includes('maps.app.goo.gl') || 
                input.includes('maps.apple.com') || input.includes('goo.gl/maps')) {
                return { url: input };
            }
            
            return null;
        }
        
        function displayLocationInfo() {
            const infoEl = document.getElementById('locationInfo');
            
            if (sharedData.latitude && sharedData.longitude) {
                infoEl.innerHTML = `
                    <p><strong>Location:</strong> ${escapeHtml(sharedData.locationName)}</p>
                    <p><strong>Coordinates:</strong> ${sharedData.latitude.toFixed(6)}, ${sharedData.longitude.toFixed(6)}</p>
                `;
                infoEl.classList.remove('hidden');
            } else if (sharedData.url) {
                infoEl.innerHTML = `
                    <p><strong>Location:</strong> ${escapeHtml(sharedData.locationName || 'Map Link')}</p>
                    <p><strong>URL:</strong> ${escapeHtml(sharedData.url)}</p>
                `;
                infoEl.classList.remove('hidden');
            } else {
                showStatus('Could not extract location from shared data', 'error');
                document.getElementById('sendBtn').disabled = true;
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showStatus(message, type = 'info') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
            statusEl.classList.remove('hidden');
        }
        
        async function sendToCar() {
            const btn = document.getElementById('sendBtn');
            const btnText = document.getElementById('sendBtnText');
            
            // Check if we have connection info
            const connectionInfo = localStorage.getItem('connection_info');
            if (!connectionInfo) {
                showStatus('Not connected to car. Please open the Companion app first.', 'error');
                return;
            }
            
            btn.disabled = true;
            btnText.innerHTML = '<span class="loading"></span>Sending...';
            
            try {
                // Store the location share request
                const shareRequest = {
                    timestamp: Date.now(),
                    ...sharedData
                };
                localStorage.setItem('pending_location_share', JSON.stringify(shareRequest));
                
                showStatus('Location saved! Opening Companion app to send...', 'success');
                
                // Wait a moment then redirect to main app
                setTimeout(() => {
                    window.location.href = '/app/';
                }, 1500);
                
            } catch (error) {
                console.error('Error:', error);
                showStatus('Failed to save location. Please try again.', 'error');
                btn.disabled = false;
                btnText.textContent = 'Send to Car';
            }
        }
        
        function openApp() {
            window.location.href = '/app/';
        }
        
        // Initialize
        parseSharedData();
    </script>
</body>
</html>
