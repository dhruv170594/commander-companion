<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1F8AFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Commander Companion">
    <title>Commander Companion</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="icon" type="image/png" href="/icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            background: #111b23;
            overflow: hidden;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #F1F3F6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }
        .container {
            max-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            justify-content: space-between;
            padding-top: 60px;
            padding-bottom: 40px;
        }
        .container > div {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
            border-radius: 16px;
        }
        .title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #F1F3F6;
        }
        .subtitle {
            font-size: 16px;
            color: #9AA3AF;
            margin-bottom: 40px;
        }
        .instruction-box {
            background: #18273c;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            margin-bottom: 24px;
        }
        .instruction-text {
            font-size: 18px;
            line-height: 1.5;
            color: #F1F3F6;
            text-align: center;
        }
        
        /* Desktop redirect */
        .desktop-message {
            display: none;
        }
        
        @media (min-width: 768px) {
            .mobile-only {
                display: none;
            }
            .desktop-message {
                display: block;
            }
        }
        
        /* Already in standalone mode - redirect to app */
        @media (display-mode: standalone) {
            body {
                display: none;
            }
        }
    </style>
    <script>
        // Check if running as installed PWA (standalone mode)
        if (window.matchMedia('(display-mode: standalone)').matches || 
            window.navigator.standalone === true) {
            // Already installed, redirect to app
            window.location.href = '/app/';
        }
        
        // Check if on desktop - redirect to app directly
        function isDesktop() {
            return window.innerWidth >= 768;
        }
        
        if (isDesktop()) {
            // Desktop users go straight to app
            // They can bookmark normally
        }
    </script>
</head>
<body>
    <div class="container mobile-only">
        <div>
            <img src="/icon-192.png" alt="Commander Companion" class="logo">
            <h1 class="title">Commander Companion</h1>
            <p class="subtitle">Remote control for your BYD</p>
        </div>
        
        <div>
            <div class="instruction-box">
                <p class="instruction-text">
                    Add this app to your home screen for the best experience
                </p>
                <button onclick="window.location.href='/app/'" style="
                    width: 100%;
                    margin-top: 16px;
                    padding: 14px;
                    background: #1F8AFF;
                    border: none;
                    border-radius: 12px;
                    color: white;
                    font-size: 16px;
                    font-weight: 600;
                    cursor: pointer;
                ">
                    Open App
                </button>
            </div>
        </div>
    </div>
    
    <div class="container desktop-message">
        <img src="/icon-192.png" alt="Commander Companion" class="logo">
        <h1 class="title">Commander Companion</h1>
        <p class="subtitle">Remote control for your BYD</p>
        
        <div class="instruction-box">
            <p class="instruction-text">
                This app is designed for mobile devices.<br><br>
                <a href="/app/" style="color: #1F8AFF; text-decoration: none;">Open the app anyway →</a>
            </p>
        </div>
    </div>
</body>
</html>
